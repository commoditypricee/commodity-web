name: Auto Update Market Data

on:
  schedule:
    - cron: '*/15 * * * *' # Her 15 dakikada bir otomatik çalışır
  workflow_dispatch: # İstersen GitHub üzerinden manuel de tetikleyebilirsin

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v3

      - name: Node.js Kurulumu
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Veri Çekme Robotunu Çalıştır
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: node update-data.js

      - name: Yeni Fiyatları data.json'a Kaydet ve Sürümle
        run: |
          git config --global user.name 'MarketBot'
          git config --global user.email 'bot@commodity.com'
          git add data.json
          git commit -m "Otomatik Piyasa Güncellemesi" || exit 0
          git push
