<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodity Price</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=9000">
</head>
<body>

    <div class="dashboard-wrapper">
        <nav class="top-nav">
           <div class="logo">Commodity <span>Price</span></div>
            <div class="clock-pill" id="clock">--:--</div>
        </nav>

        <main class="bento-grid">
            
            <div class="bento-item main-chart-wrapper">
                <div class="chart-header">
                    <h2 id="chart-title">GOLD PRICE</h2>
                    <div class="time-filters">
                        <button class="time-btn active" data-days="1">1 Day</button>
                        <button class="time-btn" data-days="30">30 Days</button>
                        <button class="time-btn" data-days="180">6 Months</button>
                        <button class="time-btn" data-days="365">1 Year</button>
                        <button class="time-btn" data-days="1825">5 Years</button>
                    </div>
                </div>
                
                <div class="chart-box">
                    <div class="main-chart" id="chart-container"></div>
                </div>
                
                <div class="performance-stats" id="perf-stats">
                    </div>
            </div>

            <div class="cards-wrapper" id="market-data">
                </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="app.js?v=9000"></script> 
</body>
</html>
