<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommodityHQ | Markets</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div class="dashboard-wrapper">
        <nav class="top-nav">
            <div class="logo">Commodity<span>HQ</span></div>
            <div class="clock-pill" id="clock">--:--</div>
        </nav>

        <main class="bento-grid">
            
            <div class="bento-item main-chart-wrapper">
                <div class="main-chart" id="chart-container"></div>
                
                <div class="chart-toolbar">
                    <button class="time-btn" data-range="1W">1W</button>
                    <button class="time-btn active" data-range="1M">1M</button>
                    <button class="time-btn" data-range="3M">3M</button>
                    <button class="time-btn" data-range="6M">6M</button>
                    <button class="time-btn" data-range="1Y">1Y</button>
                    <button class="time-btn" data-range="5Y">5Y</button>
                </div>
            </div>

            <div class="cards-wrapper" id="market-data"></div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="app.js?v=11"></script> 
</body>
</html>
