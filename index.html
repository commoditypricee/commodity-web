<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommodityHQ | Markets</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div class="dashboard-wrapper">
        <nav class="top-nav">
            <div class="logo">Commodity<span>HQ</span></div>
            <div class="clock-pill" id="clock">--:--</div>
        </nav>

        <main class="bento-grid">
            
            <div class="bento-item main-chart-wrapper">
                
                <div class="chart-header">
                    <h2 id="chart-title">GOLD (1 Month)</h2>
                    <div class="time-filters">
                        <button class="time-btn" data-days="7">1 Week</button>
                        <button class="time-btn active" data-days="30">1 Month</button>
                        <button class="time-btn" data-days="90">3 Months</button>
                        <button class="time-btn" data-days="180">6 Months</button>
                        <button class="time-btn" data-days="365">1 Year</button>
                        <button class="time-btn" data-days="1825">5 Years</button>
                    </div>
                </div>

                <div class="main-chart" id="chart-container"></div>
            </div>

            <div class="cards-wrapper" id="market-data"></div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="app.js?v=200"></script> 
</body>
</html>
